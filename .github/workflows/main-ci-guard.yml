name: Main CI Guard

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  main-ci-guard:
    name: Main CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Call reusable main CI guard
        uses: paruff/ufawkespipe/.github/workflows/reusable-main-ci-guard.yml@v1.2.0
        with:
          workflow-id: code-quality.yml

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
