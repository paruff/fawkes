name: Reusable Policy Enforcement

on:
  workflow_call:
    inputs:
      policy-path:
        description: "Path to OPA/Rego policy files"
        required: false
        type: string
        default: ".security-plane/policies"
      target-path:
        description: "Path to files to validate against policies"
        required: false
        type: string
        default: "."
      fail-on-violation:
        description: "Fail workflow on policy violations"
        required: false
        type: boolean
        default: true
      policy-namespaces:
        description: "Comma-separated list of policy namespaces to check"
        required: false
        type: string
        default: "main,security,compliance"
      scan-dockerfiles:
        description: "Scan Dockerfiles against policies"
        required: false
        type: boolean
        default: true
      scan-k8s-manifests:
        description: "Scan Kubernetes manifests against policies"
        required: false
        type: boolean
        default: true
      scan-compose:
        description: "Scan Docker Compose files against policies"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  enforce-policies:
    name: Policy Enforcement
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Conftest
        run: |
          CONFTEST_VERSION="0.49.1"
          wget -qO conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Verify policies exist
        id: verify
        run: |
          if [ -d "${{ inputs.policy-path }}" ]; then
            POLICY_COUNT=$(find "${{ inputs.policy-path }}" -name "*.rego" | wc -l)
            echo "policy-count=$POLICY_COUNT" >> $GITHUB_OUTPUT
            echo "Found $POLICY_COUNT policy files"
          else
            echo "Policy directory not found: ${{ inputs.policy-path }}"
            echo "policy-count=0" >> $GITHUB_OUTPUT
          fi

      - name: Run policy checks on Kubernetes manifests
        if: steps.verify.outputs.policy-count > 0 && inputs.scan-k8s-manifests
        continue-on-error: ${{ !inputs.fail-on-violation }}
        run: |
          echo "Checking Kubernetes manifests against policies..."

          K8S_FILES=$(find ${{ inputs.target-path }} -type f \( -name "*.yaml" -o -name "*.yml" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.github/*" \
            -not -path "*/vendor/*" \
            -not -path "*/.security-plane/*" | head -20)

          if [ -z "$K8S_FILES" ]; then
            echo "No Kubernetes manifest files found"
            exit 0
          fi

          VIOLATIONS=0
          for file in $K8S_FILES; do
            echo "Checking: $file"
            if ! conftest test "$file" -p "${{ inputs.policy-path }}" --all-namespaces; then
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done

          if [ $VIOLATIONS -gt 0 ]; then
            echo "Found $VIOLATIONS file(s) with policy violations"
            if [ "${{ inputs.fail-on-violation }}" == "true" ]; then
              exit 1
            fi
          else
            echo "All files passed policy checks"
          fi

      - name: Run policy checks on Dockerfiles
        if: steps.verify.outputs.policy-count > 0 && inputs.scan-dockerfiles
        continue-on-error: ${{ !inputs.fail-on-violation }}
        run: |
          echo "Checking Dockerfiles against policies..."

          DOCKERFILES=$(find ${{ inputs.target-path }} -type f -name "Dockerfile*" \
            -not -path "*/node_modules/*" \
            -not -path "*/vendor/*" | head -20)

          if [ -z "$DOCKERFILES" ]; then
            echo "No Dockerfiles found"
            exit 0
          fi

          VIOLATIONS=0
          for file in $DOCKERFILES; do
            echo "Checking: $file"
            if ! conftest test "$file" -p "${{ inputs.policy-path }}" --all-namespaces; then
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done

          if [ $VIOLATIONS -gt 0 ]; then
            echo "Found $VIOLATIONS Dockerfile(s) with policy violations"
            if [ "${{ inputs.fail-on-violation }}" == "true" ]; then
              exit 1
            fi
          else
            echo "All Dockerfiles passed policy checks"
          fi

      - name: Run policy checks on Docker Compose files
        if: steps.verify.outputs.policy-count > 0 && inputs.scan-compose
        continue-on-error: ${{ !inputs.fail-on-violation }}
        run: |
          echo "Checking Docker Compose files against policies..."

          COMPOSE_FILES=$(find ${{ inputs.target-path }} -type f \( -name "compose*.yml" -o -name "compose*.yaml" -o -name "docker-compose*.yml" -o -name "docker-compose*.yaml" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/vendor/*" | head -10)

          if [ -z "$COMPOSE_FILES" ]; then
            echo "No Docker Compose files found"
            exit 0
          fi

          VIOLATIONS=0
          for file in $COMPOSE_FILES; do
            echo "Checking: $file"
            if ! conftest test "$file" -p "${{ inputs.policy-path }}" --all-namespaces; then
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done

          if [ $VIOLATIONS -gt 0 ]; then
            echo "Found $VIOLATIONS Compose file(s) with policy violations"
            if [ "${{ inputs.fail-on-violation }}" == "true" ]; then
              exit 1
            fi
          else
            echo "All Compose files passed policy checks"
          fi

      - name: Generate policy report
        if: always()
        run: |
          echo "### Policy Enforcement Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Policy Path | ${{ inputs.policy-path }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Policy Files | ${{ steps.verify.outputs.policy-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfiles | ${{ inputs.scan-dockerfiles }} |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s Manifests | ${{ inputs.scan-k8s-manifests }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Compose | ${{ inputs.scan-compose }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Enforcement | ${{ inputs.fail-on-violation && 'Strict (blocking)' || 'Advisory (non-blocking)' }} |" >> $GITHUB_STEP_SUMMARY

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
