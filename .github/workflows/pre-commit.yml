name: Pre-commit Validation

"on":
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      base_sha: ${{ steps.filter.outputs.base_sha }}
      language: ${{ steps.filter.outputs.language }}
      terraform: ${{ steps.filter.outputs.terraform }}
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed files by layer
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi
          echo "base_sha=$BASE" >> "$GITHUB_OUTPUT"

          if git diff --name-only "$BASE" HEAD -- '*.py' '*.sh' '*.go' | grep -q .; then
            echo "language=true" >> "$GITHUB_OUTPUT"
          else
            echo "language=false" >> "$GITHUB_OUTPUT"
          fi

          if git diff --name-only "$BASE" HEAD | grep -Eq '^infra/.*\.(tf|tfvars)$'; then
            echo "terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "terraform=false" >> "$GITHUB_OUTPUT"
          fi

          if git diff --name-only "$BASE" HEAD -- 'infra/kubernetes/**' 'platform/**' 'charts/**' | grep -q .; then
            echo "platform=true" >> "$GITHUB_OUTPUT"
          else
            echo "platform=false" >> "$GITHUB_OUTPUT"
          fi

  # ==========================================================================
  # Layer 0 — Base: whitespace, syntax, secrets (fastest, ~30s)
  # ==========================================================================
  pre-commit-base:
    name: "Pre-commit · Base"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: detect-changes
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-base-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-base-${{ runner.os }}-

      - name: Run base hooks
        id: pre-commit
        run: |
          BASE="${{ needs.detect-changes.outputs.base_sha }}"
          pre-commit run check-yaml --from-ref "$BASE" --to-ref HEAD
          pre-commit run check-json --from-ref "$BASE" --to-ref HEAD
          pre-commit run check-added-large-files --from-ref "$BASE" --to-ref HEAD
          pre-commit run check-merge-conflict --from-ref "$BASE" --to-ref HEAD
          pre-commit run detect-private-key --from-ref "$BASE" --to-ref HEAD
        continue-on-error: true

      - name: Check status
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Base pre-commit hooks failed"
          exit 1

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Layer 1 — Language: Python, Shell, Go, Markdown
  # ==========================================================================
  pre-commit-language:
    name: "Pre-commit · Language"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    if: needs.detect-changes.outputs.language == 'true'
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-lang-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-lang-${{ runner.os }}-

      - name: Run language hooks
        id: pre-commit
        run: |
          BASE="${{ needs.detect-changes.outputs.base_sha }}"
          pre-commit run flake8 --from-ref "$BASE" --to-ref HEAD
          pre-commit run shellcheck --from-ref "$BASE" --to-ref HEAD
          if git diff --name-only "$BASE" HEAD -- '*.go' | grep -q .; then
            pre-commit run golangci-lint --from-ref "$BASE" --to-ref HEAD
          else
            echo "No Go file changes detected; skipping golangci-lint"
          fi
        continue-on-error: true

      - name: Check status
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Language pre-commit hooks failed"
          exit 1

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Layer 2 — Tool: YAML lint, Terraform fmt/validate/tflint
  # ==========================================================================
  pre-commit-tool:
    name: "Pre-commit · Tool"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.5

      - name: Cache Terraform providers
        uses: actions/cache@v5
        with:
          path: |
            ~/.terraform.d/plugin-cache
            **/.terraform/providers
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-tool-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-tool-${{ runner.os }}-

      - name: Run tool hooks
        id: pre-commit
        run: |
          BASE="${{ needs.detect-changes.outputs.base_sha }}"
          pre-commit run yamllint --from-ref "$BASE" --to-ref HEAD
          pre-commit run terraform_tflint --from-ref "$BASE" --to-ref HEAD
          pre-commit run terraform_tfsec --from-ref "$BASE" --to-ref HEAD
        continue-on-error: true

      - name: Check status
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Tool pre-commit hooks failed"
          exit 1

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Layer 3 — Platform: K8s, ArgoCD, Helm, Backstage, MkDocs, security
  # ==========================================================================
  pre-commit-platform:
    name: "Pre-commit · Platform"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    if: needs.detect-changes.outputs.platform == 'true'
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements*.txt"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.28.0"

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: "v3.13.0"

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin
          rm kubeval-linux-amd64.tar.gz

      - name: Install kustomize
        run: |
          VERSION="v5.3.0"
          wget -q -O kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${VERSION}/kustomize_${VERSION}_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          rm kustomize.tar.gz

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Install MkDocs deps
        run: pip install -r requirements.txt

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-platform-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-platform-${{ runner.os }}-

      - name: Run platform hooks
        id: pre-commit
        run: |
          BASE="${{ needs.detect-changes.outputs.base_sha }}"
          pre-commit run kubeval --from-ref "$BASE" --to-ref HEAD
          pre-commit run kustomize-validate --from-ref "$BASE" --to-ref HEAD
          pre-commit run backstage-catalog-validate --from-ref "$BASE" --to-ref HEAD
          pre-commit run argocd-validate --from-ref "$BASE" --to-ref HEAD
          pre-commit run helm-lint --from-ref "$BASE" --to-ref HEAD
          pre-commit run check-k8s-secrets --from-ref "$BASE" --to-ref HEAD
          pre-commit run mkdocs-validate --from-ref "$BASE" --to-ref HEAD
        continue-on-error: true

      - name: Check status
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Platform pre-commit hooks failed"
          exit 1

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
