name: Pre-commit Validation

"on":
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ==========================================================================
  # Layer 0 — Base: whitespace, syntax, secrets (fastest, ~30s)
  # ==========================================================================
  pre-commit-base:
    name: "Pre-commit · Base"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-base-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-base-${{ runner.os }}-

      - name: Run base hooks
        id: pre-commit
        run: |
          pre-commit run trailing-whitespace --all-files
          pre-commit run end-of-file-fixer --all-files
          pre-commit run check-yaml --all-files
          pre-commit run check-json --all-files
          pre-commit run check-added-large-files --all-files
          pre-commit run check-merge-conflict --all-files
          pre-commit run mixed-line-ending --all-files
          pre-commit run detect-private-key --all-files
          pre-commit run prettier --all-files
          pre-commit run insert-license --all-files
        continue-on-error: true

      - name: Check status
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Base pre-commit hooks failed"
          exit 1

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Layer 1 — Language: Python, Shell, Go, Markdown
  # ==========================================================================
  pre-commit-language:
    name: "Pre-commit · Language"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-lang-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-lang-${{ runner.os }}-

      - name: Run language hooks
        id: pre-commit
        run: |
          pre-commit run black --all-files
          pre-commit run ruff --all-files
          pre-commit run flake8 --all-files
          pre-commit run shellcheck --all-files
          pre-commit run shfmt --all-files
          pre-commit run golangci-lint --all-files
          pre-commit run markdownlint --all-files
        continue-on-error: true

      - name: Check status
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Language pre-commit hooks failed"
          exit 1

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Layer 2 — Tool: YAML lint, Terraform fmt/validate/tflint
  # ==========================================================================
  pre-commit-tool:
    name: "Pre-commit · Tool"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.5

      - name: Cache Terraform providers
        uses: actions/cache@v5
        with:
          path: |
            ~/.terraform.d/plugin-cache
            **/.terraform/providers
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-tool-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-tool-${{ runner.os }}-

      - name: Run tool hooks
        id: pre-commit
        run: |
          pre-commit run yamllint --all-files
          pre-commit run terraform_fmt --all-files
          pre-commit run terraform_validate --all-files
          pre-commit run terraform_tflint --all-files
          pre-commit run terraform_docs --all-files
          pre-commit run terraform_tfsec --all-files
        continue-on-error: true

      - name: Check status
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Tool pre-commit hooks failed"
          exit 1

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Layer 3 — Platform: K8s, ArgoCD, Helm, Backstage, MkDocs, security
  # ==========================================================================
  pre-commit-platform:
    name: "Pre-commit · Platform"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements*.txt"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.0"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.13.0"

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin
          rm kubeval-linux-amd64.tar.gz

      - name: Install kustomize
        run: |
          VERSION="v5.3.0"
          wget -q -O kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${VERSION}/kustomize_${VERSION}_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          rm kustomize.tar.gz

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Install MkDocs deps
        run: pip install -r requirements.txt

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-platform-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-platform-${{ runner.os }}-

      - name: Run platform hooks
        id: pre-commit
        run: |
          pre-commit run kubeval --all-files
          pre-commit run kustomize-validate --all-files
          pre-commit run backstage-catalog-validate --all-files
          pre-commit run argocd-validate --all-files
          pre-commit run helm-lint --all-files
          pre-commit run check-k8s-secrets --all-files
          pre-commit run mkdocs-validate --all-files
          pre-commit run gitleaks --all-files
          pre-commit run detect-secrets --all-files
        continue-on-error: true

      - name: Check status
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::error::Platform pre-commit hooks failed"
          exit 1

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
