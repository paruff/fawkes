name: Security Plane - Complete Adoption

# Trigger: manual only
on:
  workflow_dispatch:
    inputs:
      enforcement-mode:
        description: 'Enforcement mode'
        required: true
        type: choice
        options:
          - advisory
          - strict
        default: advisory
      image-name:
        description: 'Container image name (for signing/SBOM)'
        required: false
        type: string
      enable-signing:
        description: 'Enable image signing with Cosign'
        required: false
        type: boolean
        default: true
      enable-sbom:
        description: 'Enable SBOM generation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Run Security Scan
        run: |
          echo "Running security scan..."
          # Add your actual security scan commands here

  policy-enforcement:
    name: Policy Enforcement
    runs-on: ubuntu-latest
    needs: security-scan
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Run Policy Enforcement
        run: |
          echo "Running policy enforcement..."
          # Add your actual policy enforcement commands here

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.enable-sbom == 'true' &&
      github.event.inputs.image-name != ''
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Generate SBOM
        run: |
          IMAGE_NAME="${{ github.event.inputs.image-name || github.repository }}"
          IMAGE_TAG="${{ github.sha }}"
          echo "Generating SBOM for $IMAGE_NAME:$IMAGE_TAG"
          # Add SBOM generation logic here (e.g., Syft/CycloneDX)

  sign-image:
    name: Sign Image
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.enable-signing == 'true' &&
      github.event.inputs.image-name != ''
    needs: [security-scan, policy-enforcement]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Sign Container Image
        env:
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_NAME="${{ github.event.inputs.image-name || github.repository }}"
          IMAGE_TAG="${{ github.sha }}"
          echo "Signing image $IMAGE_NAME:$IMAGE_TAG"
          # Add Cosign signing logic here

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [security-scan, policy-enforcement, generate-sbom, sign-image]
    if: always()
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Generate Security Badge
        run: |
          echo "### 🔒 Security Plane Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.security-scan.result }}" == "success" ] && [ "${{ needs.policy-enforcement.result }}" == "success" ]; then
            echo "![Security](https://img.shields.io/badge/security-passing-brightgreen)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All security checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "![Security](https://img.shields.io/badge/security-failing-red)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Security checks failed. Review the scan and policy enforcement results." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Completed Checks" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scanning: ${{ needs.security-scan.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Vulnerability Scanning: ${{ needs.security-scan.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Policy Enforcement: ${{ needs.policy-enforcement.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.generate-sbom.result }}" != "skipped" ]; then
            echo "- SBOM Generation: ${{ needs.generate-sbom.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.sign-image.result }}" != "skipped" ]; then
            echo "- Image Signing: ${{ needs.sign-image.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
