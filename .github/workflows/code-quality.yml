name: Code Quality

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # File Change Detection
  # ==========================================================================
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for file changes
        id: filter
        run: |
          # Check for TypeScript/JavaScript files in design-system
          if find design-system -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) 2>/dev/null | grep -q .; then
            echo "typescript=true" >> $GITHUB_OUTPUT
            echo "✅ TypeScript/JavaScript files found in design-system"
          else
            echo "typescript=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No TypeScript/JavaScript files found in design-system"
          fi

          # Check for Go files
          if find . -type f -name "*.go" 2>/dev/null | grep -q .; then
            echo "go=true" >> $GITHUB_OUTPUT
            echo "✅ Go files found"
          else
            echo "go=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No Go files found"
          fi

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Python Code Quality
  # ==========================================================================
  python-quality:
    name: Python Linting & Testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff (fast linter)
        run: |
          ruff check .

      - name: Run Black (formatter check)
        run: |
          black --check --diff .

      - name: Run Ruff (fast Python linter)
        run: |
          ruff check .

      - name: Run Flake8 (linter)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --statistics

      - name: Run MyPy (type checking)
        run: |
          mypy --install-types --non-interactive --ignore-missing-imports tests/unit/

      - name: Run Pylint (advanced linting)
        run: |
          pylint --rcfile=/dev/null --max-line-length=120 --disable=C,R,W tests/unit/

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Python Test Coverage
  # ==========================================================================
  python-coverage:
    name: Python Test Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing --cov-fail-under=60 tests/unit/

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage-report
          path: |
            coverage.xml
            htmlcov/

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60
        continue-on-error: true

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # TypeScript/JavaScript Quality (for design-system)
  # ==========================================================================
  typescript-quality:
    name: TypeScript/JavaScript Linting
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.typescript == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'design-system/package-lock.json'

      - name: Install dependencies
        working-directory: ./design-system
        run: npm ci

      - name: Run ESLint
        working-directory: ./design-system
        run: npm run lint

      - name: Run TypeScript compiler check
        working-directory: ./design-system
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: ./design-system
        run: |
          npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: typescript-coverage-report
          path: design-system/coverage/

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Go Code Quality
  # ==========================================================================
  go-quality:
    name: Go Linting
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: tests/terratest/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: tests/terratest
          args: --timeout=5m --config ../../.golangci.yml

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Shell Script Quality
  # ==========================================================================
  shell-quality:
    name: Shell Script Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error

      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.8.0
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Check shfmt version
        run: shfmt --version

      - name: Check shell script formatting with shfmt
        run: |
          find scripts tests -name "*.sh" | grep -v buildplatform.sh \
            | xargs -r shfmt -i 2 -ci -bn -sr -d

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Shell Script Testing with BATS
  # ==========================================================================
  shell-tests:
    name: Shell Script Tests (BATS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install BATS and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          # Try to install kcov, but don't fail if unavailable (not in Ubuntu 24.04)
          sudo apt-get install -y kcov || echo "⚠️  kcov not available, coverage reporting will be skipped"
          ./tests/bats/install-bats.sh --prefix "${HOME}/.local"
          echo "${HOME}/.local/bin" >> $GITHUB_PATH

      - name: Run BATS tests
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          ./tests/bats/run-tests.sh --junit --coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bats-test-results
          path: reports/bats-results/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bats-coverage-report
          path: reports/bats-coverage/

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const summary = `## 🐚 Shell Script Test Results

            BATS tests completed. Coverage report and test results are available in the artifacts.

            📊 **Coverage Target**: 80%+
            🧪 **Test Framework**: BATS (Bash Automated Testing System)

            Download artifacts to view detailed coverage report.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
        continue-on-error: true

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # YAML Code Quality
  # ==========================================================================
  yaml-quality:
    name: YAML Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -f github -c .yamllint .

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Security Scanning Integration Check
  # ==========================================================================
  security-integration:
    name: Security Scanning Status
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python for security scanning
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Install Bandit
        run: pip install bandit==1.8.3

      - name: Run Bandit (Python security scan)
        run: |
          # Run bandit at HIGH severity only (-lll) to catch critical security issues
          bandit -r services/ tests/ -lll \
            -x tests/bats,tests/e2e,tests/performance,tests/chaos,tests/bdd \
            -f json -o bandit-report.json || BANDIT_EXIT=$?
          # Summarise findings for the CI log
          python - <<'PYEOF'
          import json
          with open("bandit-report.json") as f:
              data = json.load(f)
          results = data.get("results", [])
          print(f"Bandit: {len(results)} HIGH severity issue(s) found")
          for r in results:
              print(f"  [{r['issue_severity']}] {r['filename']}:{r['line_number']} - {r['issue_text']}")
          PYEOF
          # Propagate original bandit exit code
          exit "${BANDIT_EXIT:-0}"

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: Check security workflow exists
        run: |
          if [ -f ".github/workflows/security-and-terraform.yml" ]; then
            echo "✅ Security workflow exists"
          else
            echo "❌ Security workflow not found"
            exit 1
          fi

      - name: Verify Gitleaks configuration
        run: |
          if [ -f ".gitleaks.toml" ]; then
            echo "✅ Gitleaks configuration exists"
          else
            echo "⚠️  Gitleaks configuration not found"
          fi

      - name: Verify pre-commit hooks
        run: |
          if [ -f ".pre-commit-config.yaml" ]; then
            echo "✅ Pre-commit configuration exists"
            grep -q "gitleaks" .pre-commit-config.yaml && echo "✅ Gitleaks hook configured"
            grep -q "detect-secrets" .pre-commit-config.yaml && echo "✅ Detect-secrets hook configured"
          else
            echo "❌ Pre-commit configuration not found"
            exit 1
          fi

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Quality Summary Report
  # ==========================================================================
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, python-quality, python-coverage, typescript-quality, go-quality, shell-quality, shell-tests, yaml-quality, security-integration]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate Quality Summary
        id: summary
        run: |
          echo "## 📊 Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Quality | ${{ needs.python-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Coverage | ${{ needs.python-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Quality | ${{ needs.typescript-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go Quality | ${{ needs.go-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shell Quality | ${{ needs.shell-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shell Tests (BATS) | ${{ needs.shell-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Quality | ${{ needs.yaml-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Integration | ${{ needs.security-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Review any failing checks above" >> $GITHUB_STEP_SUMMARY
          echo "- Run \`make pre-commit-setup\` locally to catch issues early" >> $GITHUB_STEP_SUMMARY
          echo "- Run \`make lint\` to run all linters locally" >> $GITHUB_STEP_SUMMARY
          echo "- Run \`make test-bats\` to run shell script tests" >> $GITHUB_STEP_SUMMARY
          echo "- See [Code Quality Standards](docs/how-to/development/code-quality-standards.md) for details" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const summary = `## 📊 Code Quality Report

            | Check | Status |
            |-------|--------|
            | Python Quality | ${{ needs.python-quality.result }} |
            | Python Coverage | ${{ needs.python-coverage.result }} |
            | TypeScript Quality | ${{ needs.typescript-quality.result }} |
            | Go Quality | ${{ needs.go-quality.result }} |
            | Shell Quality | ${{ needs.shell-quality.result }} |
            | Shell Tests (BATS) | ${{ needs.shell-tests.result }} |
            | YAML Quality | ${{ needs.yaml-quality.result }} |
            | Security Integration | ${{ needs.security-integration.result }} |

            ### 📈 Quality Gates

            ✅ **Passed**: All checks completed successfully
            ⚠️  **Warning**: Some checks have warnings
            ❌ **Failed**: Critical issues found

            ### 🔧 How to Fix

            Run locally before pushing:
            \`\`\`bash
            make pre-commit-setup  # Install pre-commit hooks
            make lint              # Run all linters
            make test-bats         # Run shell script tests
            pytest --cov=. --cov-report=term-missing  # Check coverage
            \`\`\`

            See [Code Quality Standards](docs/how-to/development/code-quality-standards.md) for more details.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
        continue-on-error: true

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
