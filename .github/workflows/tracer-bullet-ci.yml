name: Tracer Bullet CI/CD

# Tracer Bullet — end-to-end pipeline:
# 1. Lint + test the service
# 2. Build Docker image
# 3. Push to GHCR (main branch only)
# 4. Update K8s manifest image tag (GitOps commit)
#
# ArgoCD auto-syncs the updated manifest to the cluster.

on:
  push:
    branches: [main]
    paths:
      - 'services/tracer-bullet/**'
      - 'platform/apps/tracer-bullet/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/tracer-bullet/**'
      - 'platform/apps/tracer-bullet/**'

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/paruff/tracer-bullet
  SERVICE_DIR: services/tracer-bullet
  MANIFEST_DIR: platform/apps/tracer-bullet

jobs:
  # ==========================================================================
  # Job 1: Lint + Test
  # ==========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '${{ env.SERVICE_DIR }}/requirements*.txt'

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          ruff check .
          black --check --diff .

      - name: Test
        working-directory: ${{ env.SERVICE_DIR }}
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80 tests/

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Job 2: Build + Push Docker Image (main only)
  # ==========================================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ==========================================================================
  # Job 3: Update GitOps manifest (main only)
  # ==========================================================================
  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in manifest
        run: |
          NEW_TAG="${{ needs.build.outputs.image_tag }}"
          echo "Updating image tag to: ${NEW_TAG}"
          sed -i "s|image: ${IMAGE_NAME}:.*|image: ${IMAGE_NAME}:${NEW_TAG}|g" \
            ${MANIFEST_DIR}/deployment.yaml
          # Also update the version label
          sed -i "s|app.kubernetes.io/version:.*|app.kubernetes.io/version: ${NEW_TAG}|g" \
            ${MANIFEST_DIR}/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${MANIFEST_DIR}/deployment.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(tracer-bullet): update image tag to ${NEW_TAG}"
            git push
          fi

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
