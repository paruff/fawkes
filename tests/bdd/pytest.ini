[pytest]
addopts = -v --strict-markers --tb=short
markers =
    smoke: Quick smoke tests
    integration: Integration tests
    azure: Azure-specific tests
    accessibility: Accessibility testing related tests
    wcag: WCAG compliance tests
    lighthouse: Lighthouse CI tests
    a11y: Accessibility (a11y) shorthand marker
    critical: Critical tests that must pass
    important: Important tests (high priority)
    normal: Normal priority tests
    components: Component-level tests
    color-contrast: Color contrast tests
    keyboard: Keyboard navigation tests
    screen-reader: Screen reader compatibility tests
    documentation: Documentation tests
    alerts: Alert configuration tests
    local-dev: Local development tests
    pr-checks: Pull request check tests
    dashboard: Dashboard and visualization tests
    automation: Automated testing and processes
    jenkins: Jenkins integration and pipeline tests
    dora-deployment-frequency: Tag for tests measuring deployment frequency
    dora-lead-time: Tag for tests measuring lead time for changes
    dora-mttr: Tag for tests measuring mean time to restore
    failure-recovery: Tag for failure recovery scenarios
    security: Tag for security-related scenarios
    local: Local environment targeted tests
    gitops: GitOps bootstrap and reconciliation validation
    golden-path: Golden Path CI/CD pipeline tests
    trunk-based: Trunk-based development tests
    mandatory: Mandatory pipeline stages
    bdd: BDD/Gherkin testing
    testing: Testing scenarios
    sonarqube: SonarQube integration tests
    trivy: Trivy security scanning tests
    artifact: Artifact generation tests
    versioning: Versioning tests
    argocd: ArgoCD deployment tests
    pr: Pull request validation tests
    fast-feedback: Fast feedback pipeline tests
    trunk-based-compliance: Trunk-based development compliance tests
    dora: DORA metrics tests
    metrics: Metrics collection tests
    notification: Notification tests
    mattermost: Mattermost integration tests
    language: Language-specific tests
    java: Java language tests
    failure: Failure handling tests
    recovery: Recovery tests
    configuration: Configuration tests
    override: Override tests
    timeout: Timeout tests
    pipeline-timeout: Pipeline timeout handling tests
    code-quality: Code quality tests
    service-deployment: Service deployment tests
    persistence: Data persistence tests
    jenkins-integration: Jenkins integration tests
    quality-gate: Quality gate tests
    success: Success scenario tests
    developer-feedback: Developer feedback tests
    access: Access control tests
    devlake: DevLake DORA metrics collection tests
    observability: Observability platform tests
    analytics: Analytics and reporting tests
    data-ingestion: Data ingestion pipeline tests
    incidents: Incident management tests
    dora-metric: Core DORA metric calculation tests
    deployment-frequency: Deployment frequency metric tests
    empty-data: Edge case tests with no data
    lead-time: Lead time for changes metric tests
    multi-commit: Multi-commit deployment tests
    cfr: Change failure rate metric tests
    mttr: Mean time to restore metric tests
    cfr-mttr: Combined CFR and MTTR tests
    incident-lifecycle: Incident lifecycle tracking tests
    operational-performance: Operational performance metric tests
    grafana: Grafana dashboard tests
    dashboards: Dashboard visualization tests
    team-filtering: Team-level filtering tests
    benchmarks: DORA benchmark comparison tests
    backstage: Backstage developer portal tests
    rework-metrics: Rework rate and CI quality tests
    edge-case: Edge case and boundary tests
    graceful-degradation: Graceful degradation tests
    high-cardinality: High cardinality performance tests
    webhooks: Webhook configuration and delivery tests
    webhook: Individual webhook event tests
    github: GitHub integration tests
    deployment: Deployment event tests
    incident: Incident webhook tests
    resolution: Incident resolution tests
    network: Network connectivity tests
    monitoring: Monitoring and metrics exposure tests
    validation: Input validation tests
    retry: Retry and resilience tests
    anomaly-detection: AI anomaly detection tests
    smart-alerting: Smart alert grouping tests
    ai-observability: AI observability dashboard tests
    acceptance: Acceptance criteria tests
    at-e2-009: AT-E2-009 acceptance test
    maintenance: Maintenance mode tests

# Point to features directory relative to pytest.ini location
bdd_features_base_dir = features/

# Make sure pytest finds test files
python_files = test_*.py
python_classes = Test*
python_functions = test_*
