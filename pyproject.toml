[tool.black]
line-length = 120
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | venv
  | _build
  | buck-out
  | build
  | dist
  | node_modules
  | vendor
  | third_party
  | templates
)/
'''

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --tb=short"

[tool.flake8]
max-line-length = 120
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
    "venv",
    "node_modules",
    "templates",
]

[tool.ruff]
line-length = 120
target-version = "py311"
# Exclude paths consistent with Black and Flake8 configurations
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
    "venv",
    "node_modules",
    "templates",
    ".eggs",
    ".mypy_cache",
    ".tox",
]

[tool.ruff.lint]
# Match flake8 ignore list so ruff does not block on pre-existing style issues
# F401: unused import, F841: unused variable, F541: f-string without placeholders
# E402: module-level import not at top, F811: redefinition, E501: line too long
# E722: bare except, E712: comparison to True/False
select = ["E", "F", "W"]
ignore = [
    "E203",  # whitespace before ':'
    "E402",  # module level import not at top of file
    "E501",  # line too long (handled by line-length setting)
    "E711",  # comparison to None
    "E712",  # comparison to True/False
    "E722",  # bare except
    "F401",  # imported but unused
    "F541",  # f-string without any placeholders
    "F811",  # redefinition of unused name
    "F841",  # local variable assigned but never used
    "F823",  # local variable referenced before assignment (false positive with module-level imports)
]
