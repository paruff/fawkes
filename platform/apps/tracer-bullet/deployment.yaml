apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracer-bullet
  namespace: fawkes
  labels:
    app: tracer-bullet
    version: v0.1.0
    app.kubernetes.io/name: tracer-bullet
    app.kubernetes.io/version: v0.1.0
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: fawkes
    app.kubernetes.io/managed-by: argocd
    team: platform-team
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tracer-bullet
  template:
    metadata:
      labels:
        app: tracer-bullet
        app.kubernetes.io/name: tracer-bullet
        app.kubernetes.io/version: v0.1.0
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: fawkes
        team: platform-team
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: tracer-bullet
          image: ghcr.io/paruff/tracer-bullet:v0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "tracer-bullet"
            - name: DEPLOYMENT_ENVIRONMENT
              value: "development"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
