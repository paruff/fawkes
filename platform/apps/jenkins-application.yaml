# ============================================================================
# FILE: argocd-apps/jenkins-application.yaml
# PURPOSE: ArgoCD Application definition for Jenkins with Golden Path CI/CD
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: fawkes
spec:
  project: default

  source:
    # Official Jenkins Helm repo
    repoURL: https://charts.jenkins.io
    chart: jenkins
    targetRevision: "5.8.102" # required by ArgoCD for Helm charts
    helm:
      # Keep values small and override via a dedicated values.yaml if you prefer
      values: |
        controller:
          image:
            registry: docker.io
            repository: jenkins/jenkins
            tag: jdk21
            tagLabel: jdk21
            pullPolicy: Always
          # Use Ingress locally to avoid port conflicts
          serviceType: ClusterIP
          executors: 0
          # Admin credentials - CHANGE BEFORE DEPLOYING
          # For production, use valueFrom.secretKeyRef to reference jenkins-admin Secret
          admin:
            username: admin
            password: CHANGE_ME_jenkins_admin_password
          # Disable setup wizard and set password consistently
          JENKINS_OPTS: "--argumentsRealm.passwd.admin=CHANGE_ME_jenkins_admin_password -Djenkins.install.runSetupWizard=false"
          # Inject admin password from secret for JCasC
          # For production: reference jenkins-admin Secret using valueFrom.secretKeyRef
          extraEnv:
            - name: ADMIN_PASSWORD
              value: "CHANGE_ME_jenkins_admin_password"
          JCasC:
            enabled: true
            defaultConfig: false
            configScripts:
              jcasc: |
                jenkins:
                  systemMessage: "Fawkes CI/CD Platform - Golden Path Enabled"
                  mode: NORMAL
                  numExecutors: 0
                  clouds:
                    - kubernetes:
                        name: "kubernetes"
                        namespace: "fawkes"
                        jenkinsUrl: "http://jenkins:8080"
                        jenkinsTunnel: "jenkins-agent:50000"
                        containerCapStr: "20"
                        templates:
                          - name: "jnlp-agent"
                            label: "k8s-agent"
                            remoteFs: "/home/jenkins"
                            instanceCapStr: "10"
                            idleTerminationMinutes: 10
                            containers:
                              - name: "jnlp"
                                image: "jenkins/inbound-agent:3256.v8e45f94d6f5c-1"
                                args: "${computer.jnlpmac} ${computer.name}"
                                workingDir: "/home/jenkins"
                          - name: "maven-agent"
                            label: "maven java"
                            remoteFs: "/home/jenkins"
                            instanceCapStr: "5"
                            idleTerminationMinutes: 10
                            containers:
                              - name: "maven"
                                image: "maven:3.9-eclipse-temurin-17"
                                command: "cat"
                                ttyEnabled: true
                                resourceRequestCpu: "1"
                                resourceRequestMemory: "2Gi"
                                resourceLimitCpu: "2"
                                resourceLimitMemory: "4Gi"
                              - name: "jnlp"
                                image: "jenkins/inbound-agent:3256.v8e45f94d6f5c-1"
                                args: "${computer.jnlpmac} ${computer.name}"
                          - name: "python-agent"
                            label: "python"
                            remoteFs: "/home/jenkins"
                            instanceCapStr: "5"
                            idleTerminationMinutes: 10
                            containers:
                              - name: "python"
                                image: "python:3.11-slim"
                                command: "cat"
                                ttyEnabled: true
                                resourceRequestCpu: "500m"
                                resourceRequestMemory: "1Gi"
                                resourceLimitCpu: "1"
                                resourceLimitMemory: "2Gi"
                              - name: "jnlp"
                                image: "jenkins/inbound-agent:3256.v8e45f94d6f5c-1"
                                args: "${computer.jnlpmac} ${computer.name}"
                          - name: "node-agent"
                            label: "node nodejs"
                            remoteFs: "/home/jenkins"
                            instanceCapStr: "5"
                            idleTerminationMinutes: 10
                            containers:
                              - name: "node"
                                image: "node:20-slim"
                                command: "cat"
                                ttyEnabled: true
                                resourceRequestCpu: "500m"
                                resourceRequestMemory: "1Gi"
                                resourceLimitCpu: "1"
                                resourceLimitMemory: "2Gi"
                              - name: "jnlp"
                                image: "jenkins/inbound-agent:3256.v8e45f94d6f5c-1"
                                args: "${computer.jnlpmac} ${computer.name}"
                          - name: "go-agent"
                            label: "go golang"
                            remoteFs: "/home/jenkins"
                            instanceCapStr: "5"
                            idleTerminationMinutes: 10
                            containers:
                              - name: "golang"
                                image: "golang:1.21"
                                command: "cat"
                                ttyEnabled: true
                                resourceRequestCpu: "500m"
                                resourceRequestMemory: "1Gi"
                                resourceLimitCpu: "1"
                                resourceLimitMemory: "2Gi"
                              - name: "jnlp"
                                image: "jenkins/inbound-agent:3256.v8e45f94d6f5c-1"
                                args: "${computer.jnlpmac} ${computer.name}"
                securityRealm:
                  local:
                    allowsSignup: false
                    users:
                      - id: "admin"
                        password: "${ADMIN_PASSWORD}"
                authorizationStrategy:
                  loggedInUsersCanDoAnything:
                    allowAnonymousRead: false
                unclassified:
                  location:
                    adminAddress: "ci-admin@fawkes.local"
                    url: "http://jenkins.127.0.0.1.nip.io"
                tool:
                  git:
                    installations:
                      - name: "Default"
                        home: "git"
                  maven:
                    installations:
                      - name: "Maven 3.9"
                        properties:
                          - installSource:
                              installers:
                                - maven:
                                    id: "3.9.6"
          ingress:
            enabled: true
            # Let the chart choose apiVersion based on the cluster; avoids template mismatch
            ingressClassName: nginx
            hostName: jenkins.127.0.0.1.nip.io
            # TLS configuration for secure access
            tls:
              - secretName: jenkins-tls
                hosts:
                  - jenkins.127.0.0.1.nip.io
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
            # Use explicit object form for paths to satisfy networking.k8s.io/v1 Ingress schema
            paths:
              - path: "/"
                pathType: Prefix
        # Golden Path required plugins
        controller:
          installPlugins:
            # Core Pipeline
            - kubernetes:4029.v5712230ccb_f8
            - workflow-aggregator:596.v8c21c963d92d
            - workflow-job:1400.v7fd111b_ec82f
            - workflow-multibranch:773.vc4fe1378f1d4
            - pipeline-stage-view:2.34
            - pipeline-utility-steps:2.16.2
            # Source Control
            - git:5.2.2
            - github:1.38.0
            - github-branch-source:1763.v8f8b_53a_e9299
            # Credentials & Security
            - credentials-binding:677.vd7c1d3f1f0e5
            - credentials:1343.v42313abcde26
            # Configuration as Code
            - configuration-as-code:1836.vccda_4a_122a_a_e
            # Shared Libraries
            - pipeline-github-lib:61.v629f2cc41d83
            # Quality & Testing
            - junit:1265.v65b_14fa_f12f0
            - jacoco:3.3.7
            - warnings-ng:11.5.0
            - htmlpublisher:1.36
            - cucumber-reports:5.8.3
            # Security Scanning
            - sonar:2.17.2
            # Notifications
            - mattermost:3.0.0
            - email-ext:1792.v3bff4c0819db
            # Kubernetes
            - kubernetes-cli:1.11.0
            # Build Tools
            - maven-plugin:3.23
            - nodejs:1.6.2
            # Utilities
            - http_request:1.18
            - pipeline-input-step:477.v339683a_8d55d
            - docker-workflow:580.vc0c340686b_54
            - timestamper:1.27
            - ansicolor:1.0.4
            - build-discarder:138.v0f76e68ad430
        persistence:
          enabled: true
          size: 8Gi
          storageClass: standard
        serviceAccount:
          create: true
        rbac:
          create: true
        # Agent configuration
        agent:
          enabled: true
          namespace: fawkes
          image: jenkins/inbound-agent
          tag: latest

  destination:
    server: https://kubernetes.default.svc
    namespace: fawkes

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

  revisionHistoryLimit: 10
