# ============================================================================
# FILE: templates/java-service/skeleton/score.yaml
# PURPOSE: SCORE workload specification for Java Spring Boot services
#          This is a platform-agnostic definition of application requirements.
# REFERENCE: https://score.dev
# ============================================================================

apiVersion: score.dev/v1b1

metadata:
  name: "${{ values.name }}"

containers:
  web:
    image: "harbor.fawkes.local/${{ values.owner }}/${{ values.name }}:0.1.0"

    resources:
      limits:
        memory: "512Mi"
        cpu: "500m"
      requests:
        memory: "256Mi"
        cpu: "250m"

    variables:
      LOG_LEVEL: "info"
      ENVIRONMENT: "${ENVIRONMENT}"
      DATABASE_URL: "${resources.db.connection_string}"

    livenessProbe:
      httpGet:
        path: /actuator/health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10

    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 5

service:
  ports:
    web:
      port: 80
      targetPort: 8080
      protocol: tcp

resources:
  db:
    type: postgres
    metadata:
      annotations:
        fawkes.dev/storage-size: "10Gi"
        fawkes.dev/version: "15"
    properties:
      database: "${{ values.name }}"

route:
  host: "${{ values.name }}.${ENVIRONMENT}.fawkes.idp"
  path: "/"
  tls:
    enabled: true

extensions:
  fawkes:
    team: "${{ values.owner }}"

    deployment:
      strategy: "RollingUpdate"
      replicas: 2

      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70

    observability:
      metrics:
        enabled: true
        port: 9090
        path: "/actuator/prometheus"

      tracing:
        enabled: true
        samplingRate: 0.1

      logging:
        enabled: true
        format: "json"
        level: "info"

    security:
      podSecurityStandard: "restricted"
      runAsNonRoot: true
      runAsUser: 65534
      networkPolicy:
        enabled: true
        allowedNamespaces:
          - "${{ values.owner }}"
          - "fawkes"

    dora:
      enabled: true
