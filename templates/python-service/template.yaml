# ============================================================================
# FILE: templates/python-service/template.yaml
# PURPOSE: Backstage software template for creating Python microservices
#          Provides a golden path with CI/CD, GitOps, and observability
# ============================================================================
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: python-service
  title: Python Microservice
  description: |
    Create a new Python microservice with FastAPI, Docker, CI/CD pipeline,
    and GitOps deployment configuration. Includes observability, security
    scanning, and automated DORA metrics collection.
  tags:
    - python
    - fastapi
    - microservice
    - recommended
spec:
  owner: platform-team
  type: service

  parameters:
    - $yaml: ../defaults/parameters/service-info.yaml
    - $yaml: ../defaults/parameters/repo-config.yaml
    - $yaml: ../defaults/parameters/deployment-config.yaml

  steps:
    - id: fetch-base
      name: Fetch Python Service Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}

    - id: register
      name: Register with Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: View in Catalog
        url: ${{ steps.register.output.catalogInfoUrl }}
